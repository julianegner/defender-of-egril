services:
  postgres:
    image: postgres:16-alpine
    container_name: defender-of-egril-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: defender
      POSTGRES_PASSWORD: defender
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defender -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-theme-builder:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../theme:/app
    # Remove any host-built node_modules first so Alpine-native packages are
    # always used. Everything stays on the same bind-mount device, which lets
    # keycloakify rename the built JAR from node_modules/.cache into
    # dist_keycloak without hitting an EXDEV cross-device-link error.
    command: sh -c "apk add --no-cache maven && rm -rf node_modules && npm install && npm run build"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: defender-of-egril-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: defender
      KC_DB_PASSWORD: defender
    ports:
      - "8081:8080"
    volumes:
      - ./egril-realm.json:/opt/keycloak/data/import/egril-realm.json:ro
      # Mount the built Keycloakify theme JAR so Keycloak picks it up automatically.
      # The JAR is built by the keycloak-theme-builder service above.
      # The JAR is produced in keycloak/theme/dist_keycloak/
      - ../theme/dist_keycloak:/opt/keycloak/providers:ro
    command: start-dev --import-realm --health-enabled=true
    depends_on:
      keycloak-theme-builder:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    # curl/wget are not available in the ubi9-micro-based Keycloak 24 image.
    # /bin/sh is a symlink to bash, so CMD-SHELL works fine.
    # We use bash's built-in /dev/tcp to call Keycloak's own /health/ready endpoint
    # (enabled by --health-enabled=true above). The endpoint returns HTTP 200 with
    # {"status":"UP"} once Keycloak is fully initialized and the realm is imported.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 5 cat <&3 | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

volumes:
  keycloak_postgres_data:
