name: defender-of-egril
base: core22
# version is injected by CI via --snap-option version=<ver>; keep a default for local builds
version: '1.0.0'
summary: Defender of Egril – Turn-based Tower Defense
description: |
  A turn-based tower defense game built with Kotlin Multiplatform and
  Compose Multiplatform. Defend the realm of Egril against waves of
  monsters by placing towers, casting spells, and managing resources.

grade: stable
confinement: strict
compression: lzo

# The DEB produced by Compose Desktop already bundles a JRE and native
# libraries, so we simply extract it into the snap root.
parts:
  app:
    plugin: dump
    source: deb
    source-type: local
    build-packages:
      - zstd
    override-build: |
      DEB=$(ls "$CRAFT_PART_SRC"/*.deb 2>/dev/null | head -1)
      if [ -z "$DEB" ]; then
        echo "No .deb file found in source directory ($CRAFT_PART_SRC)"
        exit 1
      fi
      echo "Extracting DEB: $DEB"
      TMP=$(mktemp -d)
      DEBABS=$(realpath "$DEB")
      (cd "$TMP" && ar x "$DEBABS")
      for f in "$TMP"/data.tar.*; do
        tar xaf "$f" -C "$CRAFT_PART_INSTALL"
      done
      echo "Installed files:"
      find "$CRAFT_PART_INSTALL" -maxdepth 4 -type f | sed "s|$CRAFT_PART_INSTALL/||" | sort | head -200

      # Create usr/bin wrapper pointing to the actual launcher from the DEB payload.
      mkdir -p "$CRAFT_PART_INSTALL/usr/bin"
      cat > "$CRAFT_PART_INSTALL/usr/bin/defender-of-egril" <<'WRAPPER'
#!/bin/sh
exec "$SNAP/opt/defender-of-egril/bin/DefenderOfEgril" "$@"
WRAPPER
      chmod +x "$CRAFT_PART_INSTALL/usr/bin/defender-of-egril"

      rm -rf "$TMP"
    stage-packages:
      - libfreetype6
      - libfontconfig1

apps:
  defender-of-egril:
    command: usr/bin/defender-of-egril
    
    environment:
      HOME: $SNAP_USER_DATA
      JAVA_HOME: $SNAP/opt/defender-of-egril/lib/runtime
    plugs:
      - home
      - network
      - x11
      - wayland
      - desktop
      - desktop-legacy
      - opengl
      - audio-playback
      - unity7
