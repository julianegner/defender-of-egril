# Nginx reverse proxy for the Defender of Egril backend at defender-backend.egril.de
#
# Terminates TLS and forwards all requests to the backend container on
# the internal Docker network (http://backend:8080).
#
# Prerequisites (one-time setup on the backend server):
#   apt-get install -y certbot
#   certbot certonly --standalone -d defender-backend.egril.de
# The certificate is then available at /etc/letsencrypt/live/defender-backend.egril.de/
# and is mounted read-only into the nginx container by docker-compose.yml.

server {
    listen 80;
    server_name defender-backend.egril.de;

    # Redirect all plain-HTTP traffic to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name defender-backend.egril.de;

    ssl_certificate     /etc/letsencrypt/live/defender-backend.egril.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/defender-backend.egril.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass              http://backend:8080;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
    }

    # Grafana dashboard – accessible at /grafana
    # GF_SERVER_ROOT_URL and GF_SERVER_SERVE_FROM_SUB_PATH are set in the
    # Grafana container so it is aware of the /grafana sub-path.
    # Redirect /grafana (no trailing slash) so browsers reach the Grafana UI.
    location = /grafana {
        return 301 /grafana/;
    }
    # No trailing slash on proxy_pass so nginx forwards the full /grafana/...
    # path to Grafana.  Grafana (GF_SERVER_SERVE_FROM_SUB_PATH=true) expects
    # to receive requests with the /grafana prefix; stripping it would cause
    # an infinite redirect loop in the browser.
    location /grafana/ {
        proxy_pass              http://grafana:3000;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
        # WebSocket support (required for Grafana Live / real-time updates).
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
    }
}
