# Production Keycloak deployment for ubuntu-8gb-nbg1-2.
#
# Keycloak connects to the shared PostgreSQL database on the DB server
# (private network IP 10.0.0.2).  The Keycloak database and user are
# created by the db-init scripts on the DB server.
#
# nginx terminates TLS for sso.julianegner.de and proxies to Keycloak
# on the internal Docker network.  The SSL certificate must be obtained
# with certbot before the first deploy (see keycloak/production/nginx.conf).
#
# Required environment variables (written to .env by the GitHub Actions workflow):
#   DB_PASSWORD              – password for the 'defender' PostgreSQL user
#   KEYCLOAK_ADMIN_PASSWORD  – password for the Keycloak 'admin' account
#   KEYCLOAK_HOSTNAME        – public hostname (sso.julianegner.de)
#
# The egril-realm.json, nginx.conf, and the theme JAR are copied to the server
# by the GitHub Actions deploy-keycloak workflow before this compose file is started.
#
# First-time setup on the server:
#   mkdir -p /opt/keycloak/providers
#   apt-get install -y certbot
#   certbot certonly --standalone -d sso.julianegner.de
#   # then trigger the Deploy Keycloak workflow

services:
  nginx:
    image: nginx:alpine
    container_name: keycloak-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx.conf is uploaded by the deploy-keycloak workflow.
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certificates obtained with certbot on the host.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: defender-of-egril-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Connect to the shared PostgreSQL on the DB server via the private network.
      KC_DB: postgres
      KC_DB_URL_HOST: 10.0.0.2
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: defender
      KC_DB_PASSWORD: ${DB_PASSWORD}
      # Public hostname so Keycloak issues correct issuer/redirect URLs.
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      # Allow plain HTTP on the internal port; TLS is terminated by nginx.
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # Trust X-Forwarded-* headers from nginx so Keycloak generates https:// URLs.
      KC_PROXY_HEADERS: xforwarded
    # Bind port 8080 to the loopback interface only so the deploy workflow can
    # reach the Admin REST API from the host (localhost:8080) without exposing
    # Keycloak publicly.  External traffic is still served exclusively through
    # nginx (ports 80/443).
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # Production realm (no test users).
      - ./egril-realm.json:/opt/keycloak/data/import/egril-realm.json:ro
      # Keycloakify theme JAR built and deployed by the CI workflow.
      - ./providers:/opt/keycloak/providers:ro
    # Use production 'start' mode (not start-dev) with HTTP enabled.
    # The realm is imported on first start only (Keycloak skips re-import when
    # the realm already exists in the database).
    command: start --import-realm --health-enabled=true
    # curl/wget are not available in the Keycloak 24 image; use bash /dev/tcp.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 5 cat <&3 | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    # Expose on the private Hetzner network interface only so Prometheus on the
    # backend server can scrape it without opening it to the public internet.
    ports:
      - "10.0.0.3:9100:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped
