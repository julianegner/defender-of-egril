# Production PostgreSQL deployment for ubuntu-8gb-nbg1-1.
#
# This database server is shared by both the Keycloak and backend services,
# which connect to it over the private Hetzner network at 10.0.0.2:5432.
#
# Required environment variables (set in .env on the server or passed inline):
#   DB_PASSWORD  – password for the 'defender' PostgreSQL user
#
# First-time setup on the server:
#   mkdir -p /opt/postgres
#   # workflow uploads docker-compose.yml and db-init/ then writes .env
#   docker compose up -d
#
# The PostgreSQL port is bound to all interfaces so that other servers on the
# Hetzner private network (10.0.0.x) can connect.  Ensure the Hetzner firewall
# rules allow port 5432 only from within the private network.

services:
  postgres:
    image: postgres:16-alpine
    container_name: defender-of-egril-db
    environment:
      POSTGRES_DB: defenderofegril
      POSTGRES_USER: defender
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      # Bind only to the private Hetzner network interface so PostgreSQL is not
      # reachable from the public internet.  10.0.0.2 is the private IP of the
      # DB server in the shared Hetzner private network.
      - "10.0.0.2:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # db-init/ contains SQL scripts run on first startup:
      #   - create-keycloak-db.sql  creates the 'keycloak' database for Keycloak
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defender -d defenderofegril"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    # Expose on the private Hetzner network interface only so Prometheus on the
    # backend server can scrape it without opening it to the public internet.
    ports:
      - "10.0.0.2:9100:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

volumes:
  postgres_data:
