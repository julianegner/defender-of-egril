services:
  postgres:
    image: postgres:16-alpine
    container_name: defender-of-egril-db
    environment:
      POSTGRES_DB: defenderofegril
      POSTGRES_USER: defender
      POSTGRES_PASSWORD: defender
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defender -d defenderofegril"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
