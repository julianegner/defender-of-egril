# Release workflow for Defender of Egril
#
# Trigger: workflow_dispatch with a version number input (major.minor.patch).
#
# What it does:
#   1. Validates the version input.
#   2. Builds platform-specific artifacts in parallel:
#        - Android APK (production release)
#        - Android AAB (production release)
#        - Linux DEB package
#        - Linux Snap package (built from DEB artifact)
#        - Linux Flatpak bundle (built from DEB artifact)
#        - macOS DMG  (optional – skipped on failure or when MAJOR=0 version is used)
#        - Windows EXE installer
#        - Windows MSI installer
#        - WebAssembly / WASM bundle
#   3. Creates a GitHub Release tagged with the version and attaches all artifacts.
#   4. Creates and pushes the git tag (v<version>) after the release is published.
#   5. Outputs a summary with download URLs for every uploaded artifact.
#
# Notes:
#   - iOS builds require Apple Developer signing certificates which must be
#     configured as repository secrets (APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#     APPLE_PROVISIONING_PROFILE, APPLE_TEAM_ID). The job is skipped automatically
#     when these secrets are absent.
#   - Android release builds require a signing keystore configured as repository
#     secrets (ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD,
#     ANDROID_STORE_PASSWORD). Without them the job falls back to a debug build.
#   - macOS DMG is optional: the release proceeds even when the DMG build fails.
#     macOS DMG requires MAJOR >= 1; versions like "0.8.0" will have their macOS
#     package version adjusted automatically in build.gradle.kts.
#   - Linux Snap and Flatpak builds are optional and do not block the release.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (major.minor.patch, e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Validate the version string and derive a versionCode for Android.
  # Outputs are shared with all downstream jobs.
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      version_tag: ${{ steps.parse.outputs.version_tag }}
      version_code: ${{ steps.parse.outputs.version_code }}
    steps:
      - name: Parse and validate version
        id: parse
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # Validate format: digits.digits.digits
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' does not match the required format major.minor.patch (e.g. 1.2.3)"
            exit 1
          fi

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Validate component ranges for Android versionCode safety.
          # versionCode = major*10000 + minor*100 + patch
          # minor and patch must be 0–99; major must be 0–21474 to stay within Int.MAX_VALUE.
          if [ "$MINOR" -gt 99 ] || [ "$PATCH" -gt 99 ]; then
            echo "::error::minor and patch components must each be between 0 and 99 (got minor=$MINOR, patch=$PATCH)"
            exit 1
          fi
          if [ "$MAJOR" -gt 21474 ]; then
            echo "::error::major component must be between 0 and 21474 to keep Android versionCode within Int.MAX_VALUE (got major=$MAJOR)"
            exit 1
          fi

          # Android versionCode: major*10000 + minor*100 + patch
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))

          echo "version=$VERSION"             >> "$GITHUB_OUTPUT"
          echo "version_tag=v$VERSION"        >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE"   >> "$GITHUB_OUTPUT"

          echo "Version:      $VERSION"
          echo "Tag:          v$VERSION"
          echo "VersionCode:  $VERSION_CODE"

  # ---------------------------------------------------------------------------
  # Android APK + AAB
  # ---------------------------------------------------------------------------
  build_android:
    name: Build Android (APK + AAB)
    needs: prepare
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
      VERSION_CODE: ${{ needs.prepare.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Decode keystore when signing secrets are present
      - name: Decode Android keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      # Signed release build (when secrets are available)
      - name: Build signed APK and AAB
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          ./gradlew \
            :composeApp:assembleProductionRelease \
            :composeApp:bundleProductionRelease \
            -PappVersion="${APP_VERSION}" \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="${ANDROID_STORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${ANDROID_KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${ANDROID_KEY_PASSWORD}"

      # Unsigned debug build fallback (when no signing secrets are configured)
      - name: Build unsigned APK and AAB (fallback)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 == '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          ./gradlew \
            :composeApp:assembleProductionDebug \
            :composeApp:bundleProductionDebug \
            -PappVersion="${APP_VERSION}"

      - name: Rename and collect APK
        run: |
          mkdir -p artifacts
          find composeApp/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \;
          find composeApp/build/outputs/bundle -name "*.aab" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: artifacts/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux DEB package
  # ---------------------------------------------------------------------------
  build_linux_deb:
    name: Build Linux DEB
    needs: prepare
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build DEB package
        run: ./gradlew :composeApp:packageDeb -PappVersion="${APP_VERSION}"

      - name: Upload Linux DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-build
          path: composeApp/build/compose/binaries/main/deb/defender-of-egril_*_amd64.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS DMG
  # ---------------------------------------------------------------------------
  build_macos:
    name: Build macOS DMG
    needs: prepare
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build macOS DMG
        run: ./gradlew :composeApp:packageDmg -PappVersion="${APP_VERSION}"
        continue-on-error: true
        id: build_dmg

      - name: Upload macOS DMG artifact
        if: steps.build_dmg.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: composeApp/build/compose/binaries/main/dmg/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux Snap package (built from the DEB artifact)
  # Optional: failure does not block the release.
  # ---------------------------------------------------------------------------
  build_linux_snap:
    name: Build Linux Snap
    needs:
      - prepare
      - build_linux_deb
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb-build
          path: snap/deb

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build snap (destructive mode)
        working-directory: snap
        run: |
          sed -i "s/^version:[[:space:]]*.*/version: '${APP_VERSION}'/" snapcraft.yaml
          snapcraft pack --destructive-mode

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-snap-build
          path: snap/*.snap
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Linux Flatpak bundle
  # Optional: failure does not block the release.
  # ---------------------------------------------------------------------------
  build_linux_flatpak:
    name: Build Linux Flatpak
    needs:
      - prepare
      - build_linux_deb
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb-build
          path: flatpak-deb

      - name: Install flatpak-builder
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Build Flatpak bundle
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
        run: |
          flatpak-builder --force-clean --repo=flatpak-repo flatpak-build-dir \
            flatpak/de.egril.defender.yml \
            --state-dir=.flatpak-builder
          flatpak build-bundle flatpak-repo \
            "de.egril.defender-${APP_VERSION}.flatpak" \
            de.egril.defender

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak-build
          path: de.egril.defender-*.flatpak
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # iOS XCFramework
  # Requires Apple Developer secrets:
  #   APPLE_CERTIFICATE            – Base64-encoded P12 signing certificate
  #   APPLE_CERTIFICATE_PASSWORD   – Password for the P12
  #   APPLE_PROVISIONING_PROFILE   – Base64-encoded .mobileprovision file
  #   APPLE_TEAM_ID                – 10-character team identifier
  # The job is skipped automatically when none of these secrets are set.
  # ---------------------------------------------------------------------------
  build_ios:
    name: Build iOS IPA
    needs: prepare
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
      HAS_APPLE_SECRETS: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - name: Check Apple secrets
        id: check_secrets
        run: |
          if [ "${{ secrets.APPLE_CERTIFICATE }}" = "" ]; then
            echo "Apple signing secrets are not configured – skipping iOS build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check_secrets.outputs.skip != 'true'

      - name: Set up JDK 24
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.check_secrets.outputs.skip != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Install Apple signing certificate
        if: steps.check_secrets.outputs.skip != 'true'
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          PP_PATH="$RUNNER_TEMP/provisioning_profile.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision

      - name: Build iOS framework
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          ./gradlew \
            :composeApp:assembleReleaseXCFramework \
            -PappVersion="${APP_VERSION}"

      - name: Archive iOS app (xcodebuild)
        if: steps.check_secrets.outputs.skip != 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            MARKETING_VERSION="${APP_VERSION}" \
            | xcpretty

      - name: Export IPA
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa"

      - name: Upload iOS IPA artifact
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Windows EXE installer
  # ---------------------------------------------------------------------------
  build_windows_exe:
    name: Build Windows EXE
    needs: prepare
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows EXE
        run: ./gradlew :composeApp:packageExe -PappVersion="$env:APP_VERSION"
        shell: pwsh

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-build
          path: composeApp\build\compose\binaries\main\exe\*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows MSI installer
  # ---------------------------------------------------------------------------
  build_windows_msi:
    name: Build Windows MSI
    needs: prepare
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows MSI
        run: ./gradlew :composeApp:packageMsi -PappVersion="$env:APP_VERSION"
        shell: pwsh

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi-build
          path: composeApp\build\compose\binaries\main\msi\*.msi
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # WebAssembly bundle
  # ---------------------------------------------------------------------------
  build_wasm:
    name: Build WebAssembly
    needs: prepare
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build WASM distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution -PappVersion="${APP_VERSION}"

      - name: Zip WASM output
        run: |
          cd composeApp/build/dist/wasmJs
          zip -r "defender-of-egril-${APP_VERSION}-wasm.zip" productionExecutable

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: composeApp/build/dist/wasmJs/defender-of-egril-*-wasm.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release with all artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build_android
      - build_linux_deb
      - build_linux_snap
      - build_linux_flatpak
      - build_macos
      - build_ios
      - build_windows_exe
      - build_windows_msi
      - build_wasm
    runs-on: ubuntu-latest
    # Always evaluate this job so the condition below can gate it properly.
    # Mandatory builds (Android, Linux DEB, Windows EXE, Windows MSI, WASM) must succeed.
    # Optional builds (macOS DMG, iOS, Linux Snap, Linux Flatpak) may fail or be skipped
    # without blocking the release.
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.build_android.result == 'success' &&
      needs.build_linux_deb.result == 'success' &&
      needs.build_windows_exe.result == 'success' &&
      needs.build_windows_msi.result == 'success' &&
      needs.build_wasm.result == 'success'
    steps:
      - name: Download Android artifacts
        if: needs.build_android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: release-assets/android

      - name: Download Linux DEB artifact
        if: needs.build_linux_deb.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-deb-build
          path: release-assets/linux

      - name: Download Linux Snap artifact
        if: needs.build_linux_snap.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-snap-build
          path: release-assets/linux
        continue-on-error: true

      - name: Download Linux Flatpak artifact
        if: needs.build_linux_flatpak.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-flatpak-build
          path: release-assets/linux
        continue-on-error: true

      - name: Download macOS artifact
        if: needs.build_macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: release-assets/macos
        continue-on-error: true

      - name: Download iOS artifact
        if: needs.build_ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ios-build
          path: release-assets/ios
        continue-on-error: true

      - name: Download Windows EXE artifact
        if: needs.build_windows_exe.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-exe-build
          path: release-assets/windows

      - name: Download Windows MSI artifact
        if: needs.build_windows_msi.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-msi-build
          path: release-assets/windows

      - name: Download WASM artifact
        if: needs.build_wasm.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: wasm-build
          path: release-assets/wasm

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version_tag }}
          name: "Defender of Egril ${{ needs.prepare.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/**/*

      - name: Write release summary
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.version_tag }}
          RELEASE_URL: ${{ steps.create_release.outputs.url }}
        run: |
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          echo "## 🎉 Defender of Egril ${TAG} released" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release page:** ${RELEASE_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Download links" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | File | Download |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|----------|" >> "$GITHUB_STEP_SUMMARY"

          # Enumerate every uploaded file and emit a table row.
          find release-assets -type f | sort | while read -r f; do
            FILENAME=$(basename "$f")
            # Derive a human-readable platform label from the directory.
            DIR=$(dirname "$f" | xargs basename)
            case "$DIR" in
              android) PLATFORM="Android" ;;
              linux)   PLATFORM="Linux" ;;
              macos)   PLATFORM="macOS" ;;
              ios)     PLATFORM="iOS" ;;
              windows) PLATFORM="Windows" ;;
              wasm)    PLATFORM="Web / WASM" ;;
              *)       PLATFORM="$DIR" ;;
            esac
            echo "| ${PLATFORM} | \`${FILENAME}\` | [⬇ Download](${BASE}/${FILENAME}) |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Optional builds (macOS DMG, Linux Snap, Linux Flatpak, iOS) are shown only when they succeeded._" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          TAG="${{ needs.prepare.outputs.version_tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists – reusing it."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
