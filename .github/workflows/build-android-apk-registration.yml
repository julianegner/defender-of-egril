name: Build Signed Android APK (ADI Registration)

on:
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read

jobs:
  build_apk_release:
    name: Build signed minimal APK with ADI registration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write ADI registration properties
        env:
          ANDROID_ADI_REGISTRATION_SNIPPET: ${{ secrets.ANDROID_ADI_REGISTRATION_SNIPPET }}
        run: |
          if [ -z "$ANDROID_ADI_REGISTRATION_SNIPPET" ]; then
            echo "::error::Secret ANDROID_ADI_REGISTRATION_SNIPPET is not set or empty."
            exit 1
          fi
          mkdir -p adi-registration-apk/app/src/main/assets
          printf '%s' "$ANDROID_ADI_REGISTRATION_SNIPPET" > adi-registration-apk/app/src/main/assets/adi-registration.properties

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed minimal release APK
        run: |
          ./gradlew \
            --project-dir adi-registration-apk \
            :app:assembleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Collect APK
        run: |
          mkdir -p artifacts/apk
          find adi-registration-apk/app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/apk/ \;
          ls -lh artifacts/apk/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-registration
          path: artifacts/apk/
          if-no-files-found: error
