# Deploy the PostgreSQL database to ubuntu-8gb-nbg1-1.
#
# This workflow SSHes into the database server and starts (or updates) the
# PostgreSQL Docker container using the compose file in deploy/db/.
#
# Server: ubuntu-8gb-nbg1-1
#   Public IP:   178.104.64.170
#   Private IP:  10.0.0.2
#
# Required GitHub Secrets:
#   PROD_SSH_PRIVATE_KEY  – SSH private key that grants access to all three
#                           production servers (add the corresponding public key
#                           to ~/.ssh/authorized_keys on each server;
#                           see deploy/README.md for step-by-step instructions)
#   PROD_DB_PASSWORD      – Password for the 'defender' PostgreSQL user
name: Deploy Database

on:
  workflow_dispatch:

jobs:
  deploy-db:
    name: Deploy PostgreSQL to ubuntu-8gb-nbg1-1
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: "✅ Checkout code"
        uses: actions/checkout@v4

      - name: "🔍 Validate SSH key (show fingerprint)"
        run: |
          TMPKEY=$(mktemp)
          printf '%s' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > "$TMPKEY"
          chmod 600 "$TMPKEY"
          echo "--- Key diagnostics ---"
          echo "First line : $(head -1 "$TMPKEY")"
          echo "Last line  : $(tail -1 "$TMPKEY")"
          echo "Line count : $(wc -l < "$TMPKEY")"
          echo "Char count : $(wc -c < "$TMPKEY")"
          echo ""
          echo "Key fingerprint (must match a key in root@178.104.64.170:~/.ssh/authorized_keys):"
          if ssh-keygen -l -f "$TMPKEY"; then
            echo "✅ Key is valid"
          else
            echo ""
            echo "⚠️  PROD_SSH_PRIVATE_KEY is NOT a valid private key."
            echo "   The most common cause is that newlines were lost when the key was"
            echo "   copied manually. Re-copy using a clipboard command (see deploy/README.md):"
            echo "     macOS : pbcopy < ~/.ssh/defender_deploy_key"
            echo "     Linux : xclip -sel clip < ~/.ssh/defender_deploy_key"
            echo "   Then paste the clipboard contents into the GitHub Secret."
          fi
          rm -f "$TMPKEY"

      - name: "📂 Upload compose file"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.64.170
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "deploy/db/docker-compose.yml"
          target: /opt/postgres
          strip_components: 2

      - name: "📂 Upload DB init scripts"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.64.170
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "db-init/"
          target: /opt/postgres/db-init
          strip_components: 1

      - name: "🚀 Start / update PostgreSQL"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.64.170
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/postgres

            # Write the .env file (overwrites on every deploy to pick up secret
            # rotation).
            cat > .env <<EOF
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            EOF

            docker compose pull
            docker compose up -d
            echo "✅ Database deployed"
