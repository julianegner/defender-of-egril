# Deploy the PostgreSQL database to ubuntu-8gb-nbg1-1.
#
# This workflow SSHes into the database server and starts (or updates) the
# PostgreSQL Docker container using the compose file in deploy/db/.
#
# Server: ubuntu-8gb-nbg1-1
#   Public IP:   178.104.64.170
#   Private IP:  10.0.0.2
#
# Required GitHub Secrets:
#   PROD_SSH_PRIVATE_KEY  – SSH private key that grants access to all three
#                           production servers (add the corresponding public key
#                           to ~/.ssh/authorized_keys on each server;
#                           see deploy/README.md for step-by-step instructions)
#   PROD_DB_PASSWORD      – Password for the 'defender' PostgreSQL user
name: Deploy Database

on:
  workflow_dispatch:

jobs:
  deploy-db:
    name: Deploy PostgreSQL to ubuntu-8gb-nbg1-1
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: "✅ Checkout code"
        uses: actions/checkout@v4

      - name: "🔑 Prepare SSH key"
        run: |
          mkdir -p "$RUNNER_TEMP/.ssh"
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/deploy_key"
          chmod 600 "$RUNNER_TEMP/.ssh/deploy_key"

      - name: "📂 Upload compose file"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.64.170
          username: root
          key_path: /github/runner_temp/.ssh/deploy_key
          source: "deploy/db/docker-compose.yml"
          target: /opt/postgres
          strip_components: 2

      - name: "📂 Upload DB init scripts"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.64.170
          username: root
          key_path: /github/runner_temp/.ssh/deploy_key
          source: "db-init/"
          target: /opt/postgres/db-init
          strip_components: 1

      - name: "🚀 Start / update PostgreSQL"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.64.170
          username: root
          key_path: /github/runner_temp/.ssh/deploy_key
          script: |
            set -euo pipefail
            cd /opt/postgres

            # Write the .env file (overwrites on every deploy to pick up secret
            # rotation).
            cat > .env <<EOF
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            EOF

            docker compose pull
            docker compose up -d
            echo "✅ Database deployed"
