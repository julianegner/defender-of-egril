# GitHub Actions workflow to build Windows EXE installer
# This workflow can be triggered manually or on push to main branch

name: Build Windows EXE

on:
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read

jobs:
  build_windows_exe:
    name: Build Windows EXE Installer
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Build Windows EXE with Gradle
        run: ./gradlew :composeApp:packageExe
        shell: bash
      
      - name: List build output
        run: |
          echo "Build completed. Listing generated files:"
          dir composeApp\build\compose\binaries\main\exe\
        shell: cmd
      
      - name: Upload Windows EXE Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-installer
          path: composeApp\build\compose\binaries\main\exe\*.exe
          if-no-files-found: error
          retention-days: 30
