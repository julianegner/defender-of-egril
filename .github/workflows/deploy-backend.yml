# Deploy the backend server to ubuntu-8gb-nbg1-3.
#
# This workflow:
#   1. Builds the backend Docker image using servers/backend/Dockerfile.
#   2. Pushes it to the GitHub Container Registry (ghcr.io).
#   3. SSHes into the backend server, uploads the compose file and nginx config,
#      writes the .env file, pulls the new image, and restarts the containers.
#
# Server: ubuntu-8gb-nbg1-3
#   Public IP:   178.104.84.83
#   Private IP:  10.0.0.4
#
# Required GitHub Secrets:
#   PROD_SSH_PRIVATE_KEY  – SSH private key for all three production servers
#   PROD_SSH_KEY_PASSPHRASE – Passphrase protecting the SSH private key
#                             (leave the secret empty if the key has no passphrase)
#   PROD_DB_PASSWORD      – Password for the 'defender' PostgreSQL user
name: Deploy Backend

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    name: Build and push backend Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: "✅ Checkout code"
        uses: actions/checkout@v4

      - name: "🔐 Log in to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "🏷️ Extract Docker metadata (tags & labels)"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: "🛠️ Build and push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: servers/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-backend:
    name: Deploy backend to ubuntu-8gb-nbg1-3
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: "✅ Checkout code"
        uses: actions/checkout@v4

      - name: "📂 Upload compose file and nginx config"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.84.83
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_KEY_PASSPHRASE }}
          source: "deploy/backend/docker-compose.yml,deploy/backend/nginx.conf"
          target: /opt/defender-of-egril/backend
          strip_components: 2

      - name: "📂 Upload Grafana provisioning config"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.84.83
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_KEY_PASSPHRASE }}
          source: "deploy/backend/grafana/"
          target: /opt/defender-of-egril/backend
          strip_components: 2

      - name: "📂 Upload Prometheus config"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.84.83
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_KEY_PASSPHRASE }}
          source: "deploy/backend/prometheus/"
          target: /opt/defender-of-egril/backend
          strip_components: 2

      - name: "🚀 Pull new image and restart backend"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.84.83
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_KEY_PASSPHRASE }}
          script: |
            set -euo pipefail
            cd /opt/defender-of-egril/backend

            # Write the .env file (overwrites on every deploy).
            cat > .env <<EOF
            GITHUB_REPOSITORY=${{ github.repository }}
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            IAM_BASE_URL=https://sso.julianegner.de
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            EOF

            # Ensure Docker Compose V2 plugin is available (docker.io on Ubuntu
            # does not include it by default; docker-compose-v2 is in the
            # Ubuntu universe repo and does not require the Docker CE repo).
            if ! docker compose version >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y docker-compose-v2
            fi

            # Log in to ghcr.io so the server can pull the image.
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Recreate backend and nginx so the updated image and nginx config
            # take effect.  || true ignores "no such container" on first deploy.
            docker compose down backend nginx grafana prometheus || true
            docker compose pull backend
            docker compose up -d
            echo "✅ Backend deployed (image tag: ${{ needs.build-and-push.outputs.image_tag }})"
