# Deploy Keycloak to ubuntu-8gb-nbg1-2.
#
# This workflow:
#   1. Builds the Keycloakify theme JAR (Node 20 + Maven).
#   2. SSHes into the Keycloak server and uploads the compose file, the
#      production realm JSON (no test users), the nginx config, and the theme JAR.
#   3. Starts / recreates the Keycloak and nginx containers.
#
# Server: ubuntu-8gb-nbg1-2
#   Public IP:   178.104.79.60
#   Private IP:  10.0.0.3
#
# Required GitHub Secrets:
#   PROD_SSH_PRIVATE_KEY         – SSH private key for all three production
#                                   servers
#   PROD_SSH_KEY_PASSPHRASE      – Passphrase protecting the SSH private key
#                                   (leave the secret empty if the key has no
#                                   passphrase)
#   PROD_DB_PASSWORD             – Password for the 'defender' PostgreSQL user
#                                   (Keycloak stores its data in the DB server)
#   PROD_KEYCLOAK_ADMIN_PASSWORD – Password for the Keycloak 'admin' account
#
# One-time server preparation before the first run:
#   apt-get install -y certbot docker.io
#   certbot certonly --standalone -d sso.julianegner.de
#   mkdir -p /opt/keycloak/providers
name: Deploy Keycloak

on:
  workflow_dispatch:

jobs:
  build-theme:
    name: Build Keycloak theme JAR
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: "✅ Checkout code"
        uses: actions/checkout@v4

      - name: "⚙️ Set up Node 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "⚙️ Set up Java (Maven is needed by Keycloakify)"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: "🛠️ Build theme JAR"
        working-directory: servers/keycloak/theme
        run: |
          npm install
          npm run build

      - name: "📤 Upload theme JAR artifact"
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-theme-jar
          # Keycloakify places the built JAR in dist_keycloak/
          path: servers/keycloak/theme/dist_keycloak/*.jar
          retention-days: 1

  deploy-keycloak:
    name: Deploy Keycloak to ubuntu-8gb-nbg1-2
    runs-on: ubuntu-latest
    needs: build-theme
    permissions:
      contents: read

    steps:
      - name: "✅ Checkout code"
        uses: actions/checkout@v4

      - name: "📥 Download theme JAR artifact"
        uses: actions/download-artifact@v4
        with:
          name: keycloak-theme-jar
          path: keycloak-theme-jar

      - name: "📂 Upload compose file, realm JSON, and nginx config"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.79.60
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_KEY_PASSPHRASE }}
          source: "deploy/keycloak/docker-compose.yml,servers/keycloak/production/egril-realm.json,servers/keycloak/production/nginx.conf"
          target: /opt/keycloak
          strip_components: 2

      - name: "📂 Upload theme JAR"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.79.60
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_KEY_PASSPHRASE }}
          source: "keycloak-theme-jar/*.jar"
          target: /opt/keycloak/providers
          strip_components: 1

      - name: "🚀 Start / update Keycloak and nginx"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.79.60
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_KEY_PASSPHRASE }}
          script: |
            set -euo pipefail
            cd /opt/keycloak

            # Ensure Docker Compose V2 plugin is available (docker.io on Ubuntu
            # does not include it by default; docker-compose-v2 is in the
            # Ubuntu universe repo and does not require the Docker CE repo).
            if ! docker compose version >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y docker-compose-v2
            fi

            # Write the .env file (overwrites on every deploy).
            cat > .env <<EOF
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            KEYCLOAK_ADMIN_PASSWORD=${{ secrets.PROD_KEYCLOAK_ADMIN_PASSWORD }}
            KEYCLOAK_HOSTNAME=sso.julianegner.de
            EOF

            # Recreate the containers so any updated realm JSON / theme JAR,
            # nginx config, and environment changes take effect.
            docker compose down keycloak nginx || true
            docker compose up -d

            # Wait here (in this SSH session) for the Keycloak container to
            # report healthy before we exit.  Without this wait the next SSH
            # step would start a fresh connection immediately and its own 3-
            # minute curl loop would expire before Keycloak finishes booting in
            # production 'start' mode (which routinely takes > 3 minutes).
            echo "Waiting for Keycloak container to become healthy..."
            for i in $(seq 1 72); do
              KC_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' defender-of-egril-keycloak 2>/dev/null || echo "not_found")
              if [ "${KC_HEALTH}" = "healthy" ]; then
                echo "✅ Keycloak container is healthy."
                break
              fi
              echo "  attempt ${i}/72 – container health: ${KC_HEALTH}, retrying in 5 s..."
              sleep 5
              if [ "${i}" -eq 72 ]; then
                echo "❌ Keycloak did not become healthy within 6 minutes."
                exit 1
              fi
            done
            echo "✅ Keycloak and nginx deployed"

      - name: "🔧 Apply Keycloak client configuration via Admin API"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.79.60
          username: root
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.PROD_SSH_KEY_PASSPHRASE }}
          script: |
            set -euo pipefail
            KC_URL="http://localhost:8080"
            ADMIN_PASSWORD="${{ secrets.PROD_KEYCLOAK_ADMIN_PASSWORD }}"

            # Keycloak only imports the realm on first start (when the realm does not
            # yet exist in the database), so changes to egril-realm.json are not applied
            # automatically on subsequent deployments.  This step uses the Admin REST API
            # to apply the desired client settings on every deployment, making it
            # idempotent regardless of whether the realm was freshly imported or already
            # existed.

            # Wait for Keycloak to be ready (up to 3 minutes).
            echo "Waiting for Keycloak to be ready..."
            for i in $(seq 1 36); do
              if curl -sf "${KC_URL}/health/ready" | grep -q '"status":"UP"'; then
                echo "Keycloak is ready."
                break
              fi
              echo "  attempt ${i}/36 – not ready yet, retrying in 5 s..."
              sleep 5
              if [ "${i}" -eq 36 ]; then
                echo "❌ Keycloak did not become ready within 3 minutes."
                exit 1
              fi
            done

            # Obtain a short-lived admin token from the master realm.
            TOKEN=$(curl -sf -X POST "${KC_URL}/realms/master/protocol/openid-connect/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=password&client_id=admin-cli&username=admin&password=${ADMIN_PASSWORD}" | \
              python3 -c "import sys, json; print(json.load(sys.stdin)['access_token'])")

            # Look up the internal UUID of the defender-of-egril-desktop client.
            CLIENT_LIST=$(curl -sf "${KC_URL}/admin/realms/egril/clients?clientId=defender-of-egril-desktop" \
              -H "Authorization: Bearer ${TOKEN}")
            CLIENT_UUID=$(echo "${CLIENT_LIST}" | python3 -c "
            import sys, json
            clients = json.load(sys.stdin)
            print(clients[0]['id'] if clients else 'NOT_FOUND')
            ")

            if [ "${CLIENT_UUID}" = "NOT_FOUND" ]; then
              echo "ℹ️  defender-of-egril-desktop client not found – skipping consent patch."
              exit 0
            fi

            # Fetch the full client representation, set consentRequired=false, and PUT it back.
            # consentRequired=true causes Keycloak to show the OAuth Grant consent page after
            # the user logs in via the Device Authorization Grant flow (RFC 8628).  Setting it
            # to false skips that page so the token is issued immediately.
            CLIENT=$(curl -sf "${KC_URL}/admin/realms/egril/clients/${CLIENT_UUID}" \
              -H "Authorization: Bearer ${TOKEN}")
            UPDATED=$(echo "${CLIENT}" | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            d['consentRequired'] = False
            print(json.dumps(d))
            ")

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              "${KC_URL}/admin/realms/egril/clients/${CLIENT_UUID}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${UPDATED}")

            if [ "${HTTP_STATUS}" = "204" ]; then
              echo "✅ consentRequired=false applied to defender-of-egril-desktop (HTTP 204)"
            else
              echo "❌ Unexpected HTTP ${HTTP_STATUS} when updating defender-of-egril-desktop."
              exit 1
            fi
