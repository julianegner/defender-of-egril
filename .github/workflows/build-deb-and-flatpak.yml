name: Build DEB and Flatpak (test)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 0.9.3)'
        required: false
        default: '0.0.0-test'

permissions:
  contents: read

jobs:
  build_linux_deb:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build DEB package
        run: ./gradlew :composeApp:packageDeb -PappVersion="${APP_VERSION}"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-build
          path: frontend/composeApp/build/compose/binaries/main/deb/defender-of-egril_*_amd64.deb
          if-no-files-found: error

  build_linux_flatpak:
    name: Build Linux Flatpak
    needs: build_linux_deb
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb-build
          path: frontend/flatpak-deb

      - name: Install flatpak-builder
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --force-clean --repo=flatpak-repo flatpak-build-dir \
            frontend/flatpak/de.egril.defender.yml \
            --state-dir=.flatpak-builder
          flatpak build-bundle flatpak-repo \
            "de.egril.defender-${APP_VERSION}.flatpak" \
            de.egril.defender

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak-build
          path: de.egril.defender-*.flatpak
          if-no-files-found: error
