name: Playwright UI Tests

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: read

jobs:
  playwright-tests:
    name: Run Playwright UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # 1. Checkout the repository
      - name: "✅ Checkout code"
        uses: actions/checkout@v4

      # 2. Set up JDK 24 for building WASM
      - name: "⚙️ Set up JDK 24"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      # 3. Set up Gradle
      - name: "⚙️ Setup Gradle"
        uses: gradle/gradle-build-action@v3

      # 4. Build the WasmJS App
      - name: "🛠️ Build WasmJS App"
        run: |
          echo "Building WASM version of Defender of Egril..."
          ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon
          echo "✅ Build complete"

      # 5. Set up Node.js for Playwright
      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 6. Install dependencies
      - name: "📦 Install npm dependencies"
        run: npm ci || npm install

      # 7. Install Playwright browsers
      - name: "🎭 Install Playwright browsers"
        run: npx playwright install --with-deps chromium

      # 8. Start web server in background
      - name: "🌐 Start WASM development server"
        run: |
          echo "Starting development server..."
          ./gradlew :composeApp:wasmJsBrowserDevelopmentRun --no-daemon &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          
          # Wait for server to be ready
          echo "Waiting for server to start..."
          for i in {1..60}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "✅ Server is ready!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "❌ Server failed to start within 60 seconds"
              exit 1
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done

      # 9. Run Playwright tests
      - name: "🎭 Run Playwright tests"
        run: |
          echo "Running Playwright tests..."
          npx playwright test --config frontend/playwright/playwright.config.ts --reporter=list,html
        continue-on-error: true  # Continue even if tests fail to upload artifacts

      # 10. Stop the server
      - name: "🛑 Stop web server"
        if: always()
        run: |
          if [ ! -z "$SERVER_PID" ]; then
            echo "Stopping server (PID: $SERVER_PID)..."
            kill $SERVER_PID || true
            # Also kill any gradle daemons
            ./gradlew --stop || true
          fi

      # 11. Upload Playwright report
      - name: "📤 Upload Playwright report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 12. Upload test screenshots
      - name: "📤 Upload test screenshots"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: frontend/test-screenshots/playwright/
          retention-days: 30

      # 13. Upload Playwright videos (if any)
      - name: "📤 Upload test videos"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: test-results/
          retention-days: 30

      # 14. Comment on workflow run with summary
      - name: "📊 Test Summary"
        if: always()
        run: |
          echo "## 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Test artifacts have been uploaded:" >> $GITHUB_STEP_SUMMARY
          echo "- **Playwright Report**: Interactive HTML report with test results" >> $GITHUB_STEP_SUMMARY
          echo "- **Screenshots**: Step-by-step screenshots from the game playthrough" >> $GITHUB_STEP_SUMMARY
          echo "- **Videos**: Recordings of failed tests (if any)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Count screenshots
          if [ -d "frontend/test-screenshots/playwright" ]; then
            SCREENSHOT_COUNT=$(find frontend/test-screenshots/playwright -name "*.png" | wc -l)
            echo "📸 **Screenshots captured**: $SCREENSHOT_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Click on the **Artifacts** section above to download the test results." >> $GITHUB_STEP_SUMMARY
