services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: defender-of-egril-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./egril-realm.json:/opt/keycloak/data/import/egril-realm.json:ro
    command: start-dev --import-realm
    # Check the egril realm endpoint on port 8080 (the main HTTP port).
    # HTTP 200 is returned only after Keycloak has fully started AND imported the realm.
    # Using CMD (not CMD-SHELL) because the ubi9-micro base image has no /bin/sh.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/realms/egril"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
