<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defender of Egril</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI Emoji', 'Noto Color Emoji', 'Apple Color Emoji', Arial, sans-serif;
        }
        
        #root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        canvas {
            outline: none;
            max-width: 100%;
            max-height: 100%;
            display: none;
        }
        
        canvas.loaded {
            display: block;
        }
        
        #loading {
            color: white;
            text-align: center;
            position: absolute;
        }
        
        #loading.hidden {
            display: none;
        }
        
        #loading h1 {
            font-size: 2em;
            margin-bottom: 1em;
        }
        
        #loading .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root">
        <div id="loading">
            <h1>Defender of Egril</h1>
            <div class="spinner"></div>
            <p>Loading game...</p>
        </div>
        <canvas id="ComposeTarget"></canvas>
    </div>
    <script src="defenderOfEgril.js"></script>
    <script>
        // Hide loading screen when canvas is ready
        const canvas = document.getElementById('ComposeTarget');
        const loading = document.getElementById('loading');
        
        // Use MutationObserver to detect when canvas starts rendering
        const observer = new MutationObserver(() => {
            if (canvas.width > 0 && canvas.height > 0) {
                canvas.classList.add('loaded');
                loading.classList.add('hidden');
                observer.disconnect();
            }
        });
        
        observer.observe(canvas, { 
            attributes: true, 
            attributeFilter: ['width', 'height'] 
        });
        
        // Fallback: hide after 3 seconds even if observer doesn't trigger
        setTimeout(() => {
            canvas.classList.add('loaded');
            loading.classList.add('hidden');
        }, 3000);
    </script>
</body>
</html>
