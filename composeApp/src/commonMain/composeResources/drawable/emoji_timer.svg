<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" version="1.1" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Stopwatch Emoji (U+23F1) -->
  <g>
    <!-- Watch body -->
    <circle cx="64" cy="70" r="45" fill="#E0E0E0" stroke="#757575" stroke-width="3"/>
    <circle cx="64" cy="70" r="40" fill="#FFFFFF" stroke="#BDBDBD" stroke-width="2"/>
    
    <!-- Button on top -->
    <rect x="59" y="15" width="10" height="15" rx="2" fill="#9E9E9E" stroke="#616161" stroke-width="1"/>
    <rect x="56" y="25" width="16" height="8" rx="3" fill="#757575" stroke="#424242" stroke-width="1"/>
    
    <!-- Hands -->
    <line x1="64" y1="70" x2="64" y2="40" stroke="#424242" stroke-width="3" stroke-linecap="round"/>
    <line x1="64" y1="70" x2="85" y2="70" stroke="#757575" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Center dot -->
    <circle cx="64" cy="70" r="4" fill="#424242"/>
  </g>
</svg>
