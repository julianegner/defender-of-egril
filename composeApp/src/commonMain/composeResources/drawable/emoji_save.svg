<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Floppy disk icon -->
  <defs>
    <linearGradient id="diskGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main body -->
  <rect x="16" y="16" width="96" height="96" rx="4" ry="4" fill="url(#diskGradient)" stroke="#2C3E50" stroke-width="2"/>
  
  <!-- Label area (top section) -->
  <rect x="16" y="16" width="96" height="32" rx="4" ry="4" fill="#34495E"/>
  <rect x="28" y="24" width="72" height="16" rx="2" ry="2" fill="#ECF0F1"/>
  
  <!-- Metal shutter -->
  <rect x="28" y="64" width="72" height="40" rx="2" ry="2" fill="#95A5A6" stroke="#7F8C8D" stroke-width="1.5"/>
  <rect x="32" y="68" width="64" height="32" rx="1" ry="1" fill="#BDC3C7"/>
  
  <!-- Shutter lines -->
  <line x1="32" y1="76" x2="96" y2="76" stroke="#7F8C8D" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="84" x2="96" y2="84" stroke="#7F8C8D" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="92" x2="96" y2="92" stroke="#7F8C8D" stroke-width="1" opacity="0.5"/>
  
  <!-- Write protection notch -->
  <rect x="96" y="20" width="12" height="12" fill="#2C3E50"/>
</svg>
