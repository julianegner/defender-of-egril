app-id: de.egril.defender
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk

command: defender-of-egril
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --filesystem=home
  - --device=dri

modules:
  - name: defender-of-egril
    buildsystem: simple
    build-commands:
      # The DEB is downloaded by the CI workflow into flatpak-deb/ before
      # running flatpak-builder. It already bundles a JRE and all native
      # dependencies, so we simply extract its contents into the Flatpak tree.
      # dpkg-deb is not available inside the freedesktop SDK build sandbox, so
      # we use ar + tar. DEBs built on Ubuntu 22.04+ use data.tar.zst (zstd
      # compression); we handle that explicitly via the zstd binary rather
      # than relying on tar having built-in zstd support.
      - |
        DEB=$(echo flatpak-deb/*.deb)
        if [ ! -f "$DEB" ]; then
          echo "No .deb file found in flatpak-deb/" >&2
          exit 1
        fi
        TMP=$(mktemp -d)
        DEBABS="$(pwd)/$DEB"
        (cd "$TMP" && ar x "$DEBABS")
        for f in "$TMP"/data.tar.*; do
          case "$f" in
            *.zst) zstd -d --stdout "$f" | tar x -f - -C /app ;;
            *) tar xaf "$f" -C /app ;;
          esac
        done
        rm -rf "$TMP"
        if [ ! -f /app/opt/defender-of-egril/bin/DefenderOfEgril ]; then
          echo "ERROR: Binary was not extracted from DEB" >&2
          exit 1
        fi
      # Install a thin wrapper script on PATH.
      - install -Dm755 flatpak/defender-of-egril.sh /app/bin/defender-of-egril
      # App icon (required by appstreamcli compose).
      - install -Dm644 composeApp/src/commonMain/composeResources/drawable/black-shield.png /app/share/icons/hicolor/256x256/apps/de.egril.defender.png
      # Desktop integration.
      - install -Dm644 flatpak/de.egril.defender.desktop /app/share/applications/de.egril.defender.desktop
      - install -Dm644 flatpak/de.egril.defender.metainfo.xml /app/share/metainfo/de.egril.defender.metainfo.xml
    sources:
      - type: dir
        path: ..
