# Remote profile
# Use this profile when connecting to a remote server.
# Replace the placeholder URLs below with the actual server addresses.
#
# You can also create additional custom profiles (e.g. profiles/staging.properties)
# by following the same format and passing the profile name to Gradle:
#   ./gradlew runLocal               (uses profiles/local.properties)
#   ./gradlew run -Pprofile=staging  (uses profiles/staging.properties)

# Keycloak IAM server URL
iam.base.url=https://keycloak.your-server.com

# Backend server URL
defender.backend.url=https://backend.your-server.com
