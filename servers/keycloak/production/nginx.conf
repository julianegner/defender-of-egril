# Nginx reverse proxy for Keycloak at sso.julianegner.de
#
# Terminates TLS and forwards all requests to the Keycloak container on
# the internal Docker network (http://keycloak:8080).
#
# Prerequisites (one-time setup on the Keycloak server):
#   apt-get install -y certbot
#   certbot certonly --standalone -d sso.julianegner.de
# The certificate is then available at /etc/letsencrypt/live/sso.julianegner.de/
# and is mounted read-only into the nginx container by docker-compose.yml.

server {
    listen 80;
    server_name sso.julianegner.de;

    # Redirect all plain-HTTP traffic to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sso.julianegner.de;

    ssl_certificate     /etc/letsencrypt/live/sso.julianegner.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sso.julianegner.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass              http://keycloak:8080;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;

        # Keycloak admin console and token endpoints return larger payloads.
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }
}
